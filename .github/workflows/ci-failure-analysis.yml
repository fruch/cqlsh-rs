name: CI Failure Analysis

# Analyzes CI failures using Claude AI and posts a structured PR comment.
# Triggered by workflow_run after the CI workflow completes with a failure.
# Requires ANTHROPIC_API_KEY secret for Claude Haiku access.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  analyze-failure:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
      checks: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Download JUnit XML test results from the failed CI run
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      # Download clippy JSON from the failed CI run
      - name: Download clippy results
        uses: actions/download-artifact@v4
        with:
          name: clippy-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      # Download build JSON from the failed CI run
      - name: Download build results
        uses: actions/download-artifact@v4
        with:
          name: build-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      # Download fmt output from the failed CI run
      - name: Download fmt results
        uses: actions/download-artifact@v4
        with:
          name: fmt-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      # Download recent failure history for recurring issue detection
      - name: Download failure history
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-failure-analysis.yml
          branch: ${{ github.event.workflow_run.head_branch }}
          name: ci-failure-.*
          name_is_regexp: true
          path: failure-history/
          if_no_artifact_found: warn
        continue-on-error: true

      # Resolve PR number from the triggering commit SHA
      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[0].number // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Analyze failures with Claude Haiku (~$0.005 per run)
      - name: Analyze CI failure
        id: analyze
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          allowed_tools: "Bash(gh run view:*),Bash(gh api:*),Bash(cat:*),Bash(ls:*),Read"
          output_format: json
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}
            FAILED WORKFLOW RUN: ${{ github.event.workflow_run.id }}
            HEAD SHA: ${{ github.event.workflow_run.head_sha }}

            Analyze the CI failure for this pull request. Follow these steps:

            1. Fetch failed job logs:
               gh run view ${{ github.event.workflow_run.id }} --log-failed

            2. If ci-artifacts/test-results.xml exists, read it for structured
               JUnit test failure data.

            3. If ci-artifacts/clippy-output.json exists, read it for structured
               Clippy diagnostics (look for entries with "reason": "compiler-message").

            4. If ci-artifacts/build-output.json exists, read it for compilation
               errors.

            5. If ci-artifacts/fmt-output.txt exists, read it for formatting issues.

            6. If failure-history/ directory has JSON files, read up to 5 of them
               to detect recurring issues: same test name or error appearing in
               multiple runs.

            7. For each failed job, determine:
               - The exact error message (first 200 chars)
               - The root cause (why it failed, be specific)
               - A suggested fix with file:line references where possible
               - A classification from: compilation_error, test_failure,
                 lint_violation, infrastructure_flaky, dependency_issue,
                 configuration_error, unknown

            8. Assess flakiness: does this look like a timing/infrastructure issue
               (testcontainer startup, network timeout, resource contention)?
               Provide confidence 0.0–1.0.

            9. Report recurring patterns: any issue seen in 2+ of the last 5 runs.

            Return ONLY a JSON object matching this exact schema (no other text):
            {
              "summary": "string — one-line overall summary",
              "total_jobs": integer,
              "failed_jobs": integer,
              "is_flaky": boolean,
              "flaky_confidence": number (0.0–1.0),
              "failures": [
                {
                  "job_name": "string",
                  "test_name": "string (optional)",
                  "error_message": "string",
                  "root_cause": "string",
                  "suggested_fix": "string",
                  "file_reference": "string (optional, e.g. src/foo.rs:42)",
                  "classification": "one of: compilation_error | test_failure | lint_violation | infrastructure_flaky | dependency_issue | configuration_error | unknown"
                }
              ],
              "recurring_issues": [
                {
                  "issue": "string",
                  "occurrences": integer,
                  "category": "string",
                  "pattern": "string (optional)",
                  "recommendation": "string"
                }
              ]
            }

      # Format and post (or update) the collapsed PR comment
      - name: Post failure summary comment
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const raw = `${{ steps.analyze.outputs.output }}`;
            if (!raw || raw.trim() === '') {
              console.log('No output from analysis step — skipping comment');
              return;
            }

            let output;
            try {
              output = JSON.parse(raw);
            } catch (e) {
              console.log('Could not parse analysis output as JSON:', e.message);
              console.log('Raw output:', raw.substring(0, 500));
              return;
            }

            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}`;

            const classEmoji = {
              compilation_error:    '🔨',
              test_failure:         '🧪',
              lint_violation:       '📏',
              infrastructure_flaky: '🔄',
              dependency_issue:     '📦',
              configuration_error:  '⚙️',
              unknown:              '❓'
            };

            // Group failures by job name
            const byJob = {};
            for (const f of output.failures || []) {
              if (!byJob[f.job_name]) byJob[f.job_name] = [];
              byJob[f.job_name].push(f);
            }

            // Unique classification labels for the header
            const classifications = [...new Set((output.failures || []).map(f => f.classification))];
            const classLabels = classifications
              .map(c => `${classEmoji[c] || '❓'} ${c.replace(/_/g, ' ')}`)
              .join(', ') || '❓ unknown';

            const flakyCfg = (output.flaky_confidence ?? 0).toFixed(2);

            let body = `## CI Failure Summary\n\n`;
            body += `**Status:** ${output.failed_jobs ?? '?'} of ${output.total_jobs ?? '?'} jobs failed`;
            body += ` | **Classification:** ${classLabels}\n`;
            body += `**Flaky:** ${output.is_flaky ? 'Yes' : 'No'} (confidence: ${flakyCfg})\n\n`;
            if (output.summary) body += `> ${output.summary}\n\n`;

            // One collapsed section per failed job
            for (const [job, failures] of Object.entries(byJob)) {
              const count = failures.length;
              body += `<details>\n`;
              body += `<summary>❌ <b>${job}</b> — ${count} issue${count > 1 ? 's' : ''} (<a href="${runUrl}">job log</a>)</summary>\n\n`;
              for (const f of failures) {
                const title = f.test_name || f.job_name;
                const errMsg = (f.error_message || '').substring(0, 200);
                body += `### \`${title}\`\n`;
                body += `- **Error:** \`${errMsg}\`\n`;
                body += `- **Root cause:** ${f.root_cause}\n`;
                body += `- **Suggested fix:** ${f.suggested_fix}\n`;
                if (f.file_reference) body += `- **File:** \`${f.file_reference}\`\n`;
                const cls = f.classification || 'unknown';
                body += `- **Category:** ${classEmoji[cls] || '❓'} ${cls.replace(/_/g, ' ')}\n\n`;
              }
              body += `</details>\n\n`;
            }

            // Recurring issues table (collapsed)
            if (output.recurring_issues && output.recurring_issues.length > 0) {
              body += `<details>\n`;
              body += `<summary>📊 <b>Recurring Issues</b> (seen across recent runs)</summary>\n\n`;
              body += `| Issue | Occurrences | Category | Recommendation |\n`;
              body += `|-------|-------------|----------|----------------|\n`;
              for (const ri of output.recurring_issues) {
                body += `| ${ri.issue} | ${ri.occurrences} | ${ri.category} | ${ri.recommendation} |\n`;
              }
              body += `\n</details>\n\n`;
            }

            body += `---\n`;
            body += `*🤖 Generated by [Claude CI Analyzer](https://github.com/anthropics/claude-code-action) • [Re-run failed jobs](${runUrl})*\n`;

            // Deduplicate: update existing bot comment rather than posting a new one
            const prNumber = parseInt(`${{ steps.pr.outputs.number }}`, 10);
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const marker = '## CI Failure Summary';
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              console.log(`Updated existing CI failure comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
              console.log('Created new CI failure comment');
            }

      # Persist failure summary as artifact for recurring issue detection (30-day retention)
      - name: Save failure history
        if: always()
        run: |
          echo '${{ steps.analyze.outputs.output }}' | \
            jq --arg run "${{ github.event.workflow_run.run_number }}" \
               --arg sha "${{ github.event.workflow_run.head_sha }}" \
               --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
               '. + {"run_number": ($run | tonumber), "timestamp": $ts, "sha": $sha}' \
            > failure-summary.json 2>/dev/null || echo '{"run_number":0,"timestamp":"","sha":""}' > failure-summary.json
        continue-on-error: true

      - name: Upload failure history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-${{ github.event.workflow_run.run_number }}
          path: failure-summary.json
          retention-days: 30

      # Auto-retry failed jobs when Claude detects a high-confidence flaky failure
      - name: Auto-retry if flaky
        if: >
          steps.analyze.outputs.output != '' &&
          fromJSON(steps.analyze.outputs.output).is_flaky == true &&
          fromJSON(steps.analyze.outputs.output).flaky_confidence > 0.8
        run: |
          echo "Flaky failure detected — triggering re-run of failed jobs"
          gh run rerun ${{ github.event.workflow_run.id }} --failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
